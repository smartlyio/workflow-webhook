name: Pull Request

on:
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    secrets: inherit 

  release:
    runs-on: ubuntu-24.04
    name: Build and release action (dry-run)
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Configure git
        uses: smartlyio/github-actions@4ef49912877febb62867891d42a1205190fb2ab0 # git-init-userinfo-v1
      - name: Release flow
        uses: smartlyio/github-actions@d6b502d53ac699d0c7d44430c685a44e8ab24140 # release-action-node-v1
        with:
          dry_run: true
          token: "${{ secrets.GITHUB_TOKEN }}"
