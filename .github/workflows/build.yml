name: Build
on:
  workflow_call

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: package.json
    - name: Install
      run: |
        npm install
    - name: Prettier
      run: |
        npm run format-check
    - name: Lint
      run: |
        npm run lint
    - name: Test
      run: |
        npm run test
    - name: build
      run: |
        npm run build
        npm run package

  test:
    runs-on: ubuntu-24.04
    services:
      httpbin:
        image: kennethreitz/httpbin@sha256:599fe5e5073102dbb0ee3dbb65f049dab44fa9fc251f6835c9990f8fb196a72b
        ports:
        - 8080:80
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: package.json
    - name: Build action for test
      run: |
        npm install
        npm run build
        npm run package
        git clean -fXd
    - name: Test executing the action
      uses: ./
      with:
        webhook_url: http://localhost:8080/post
        webhook_secret: supersecret
        webhook_auth: othersecret
        data: '{"my-key": "my-value"}'
